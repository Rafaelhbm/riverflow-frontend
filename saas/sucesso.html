<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/variables.css">

  <link rel="stylesheet" href="../css/checkout.css">

  <title>Tudo certo! · RiverFlow</title>

<body class="checkout-body">

  <header class="checkout-topbar">
    <div class="checkout-topbar__inner">
      <a href="../index.html" class="checkout-brand">River<span>Flow</span></a>
    </div>
  </header>

  <main class="checkout-main">
    <div class="success-box">
      <div class="success-box__icon" aria-hidden="true">✓</div>
      <h1>Pagamento confirmado!</h1>
      <p>Sua assinatura está sendo ativada. Em instantes você recebe um e-mail com os
         dados de acesso ao sistema e ao curso.</p>
      <p>A confirmação é processada automaticamente — se ainda não chegou, aguarde
         alguns minutos.</p>
      <a class="btn btn--primary" href="../area">Ir para minha conta</a>
      <a class="btn" href="../cursos">Ver os cursos</a>
    </div>
  </main>
