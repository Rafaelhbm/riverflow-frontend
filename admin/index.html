<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/admin.css">

  <title>Painel — Cursos · RiverFlow</title>
</head>
<body class="admin">

  <header class="admin-topbar">
    <div class="admin-topbar__inner">
      <a href="../index.html" class="admin-brand">River<span>Flow</span> <em>admin</em></a>
      <nav class="admin-topbar__nav">
        <a href="index.html" class="is-active">Cursos</a>
        <a href="custos.html">Custos</a>
        <a href="../cursos" target="_blank" rel="noopener">Ver catálogo &nearr;</a>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-container">

      <div class="admin-head">
        <h1>Cursos</h1>
        <button class="btn btn--primary" data-new-course>+ Novo curso</button>
      </div>

      <!-- Formulário de novo curso (oculto até clicar) -->
      <form class="admin-card admin-form" data-new-course-form hidden>
        <h2>Novo curso</h2>
        <div class="admin-grid-2">
          <label class="field">
            <span>Título</span>
            <input name="titulo" type="text" maxlength="160" required placeholder="Ex.: Domine o FlowCivil">
          </label>
          <label class="field">
            <span>Slug (URL)</span>
            <input name="slug" type="text" maxlength="120" required placeholder="flowcivil" pattern="[a-z0-9]+(-[a-z0-9]+)*">
          </label>
        </div>
        <label class="field">
          <span>SaaS relacionado (opcional)</span>
          <input name="saas_id" type="text" maxlength="60" placeholder="flowcivil">
        </label>
        <p class="admin-feedback" data-feedback role="status" aria-live="polite"></p>
        <div class="admin-form__actions">
          <button type="button" class="btn btn--ghost" data-cancel>Cancelar</button>
          <button type="submit" class="btn btn--primary">Criar curso</button>
        </div>
      </form>

      <p class="admin-state" data-state role="status" aria-live="polite">Carregando...</p>
      <div class="admin-list" data-courses></div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/session-guard.js"></script>
  <script src="../js/admin-api.js"></script>
  <script defer src="../js/admin-list.js"></script>

</body>
</html>
