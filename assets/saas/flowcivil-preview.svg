<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0A1628"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1" fill="#1E88E5" opacity="0.06"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>

  <!-- Left panel: sidebar nav -->
  <rect x="0" y="0" width="180" height="400" fill="#0D1E35"/>
  <rect x="180" y="0" width="1" height="400" fill="#142235"/>

  <!-- Logo area -->
  <text x="20" y="38" fill="#1E88E5" font-size="13" font-weight="500" letter-spacing="2" class="mono">FLOWCIVIL</text>
  <rect x="20" y="46" width="140" height="1" fill="#1E88E5" opacity="0.3"/>

  <!-- Nav items -->
  <rect x="0" y="60" width="180" height="32" fill="#1E88E5" opacity="0.12"/>
  <rect x="16" y="70" width="3" height="12" fill="#1E88E5" rx="1"/>
  <text x="28" y="81" fill="#F8FAFC" font-size="11" font-weight="500">Obras</text>

  <text x="28" y="114" fill="#94A3B8" font-size="11">Equipamentos</text>
  <text x="28" y="146" fill="#94A3B8" font-size="11">Equipes</text>
  <text x="28" y="178" fill="#94A3B8" font-size="11">Custos</text>
  <text x="28" y="210" fill="#94A3B8" font-size="11">Recursos</text>
  <text x="28" y="242" fill="#94A3B8" font-size="11">Dashboard</text>

  <!-- Divider -->
  <rect x="20" y="260" width="140" height="1" fill="#142235"/>

  <!-- Status indicator -->
  <circle cx="27" cy="290" r="4" fill="#22C55E"/>
  <text x="38" y="294" fill="#94A3B8" font-size="10">3 obras ativas</text>

  <!-- Main content area -->
  <!-- Header bar -->
  <rect x="180" y="0" width="620" height="52" fill="#0D1E35"/>
  <rect x="180" y="52" width="620" height="1" fill="#142235"/>
  <text x="204" y="30" fill="#F8FAFC" font-size="14" font-weight="500">Obras em Andamento</text>
  <text x="204" y="44" fill="#94A3B8" font-size="10">Atualizado agora · 3 projetos ativos</text>

  <!-- Stats bar -->
  <rect x="590" y="10" width="80" height="30" fill="#1E88E5" opacity="0.15" rx="4"/>
  <rect x="591" y="11" width="2" height="28" fill="#1E88E5" rx="1"/>
  <text x="600" y="24" fill="#4FC3F7" font-size="9" font-weight="500">HOJE</text>
  <text x="600" y="36" fill="#F8FAFC" font-size="10">R$ 48.200</text>

  <!-- Table header -->
  <rect x="200" y="68" width="580" height="24" fill="#142235" rx="3"/>
  <text x="216" y="84" fill="#94A3B8" font-size="9" letter-spacing="1">OBRA</text>
  <text x="380" y="84" fill="#94A3B8" font-size="9" letter-spacing="1">PROGRESSO</text>
  <text x="520" y="84" fill="#94A3B8" font-size="9" letter-spacing="1">EQUIPE</text>
  <text x="640" y="84" fill="#94A3B8" font-size="9" letter-spacing="1">STATUS</text>
  <text x="730" y="84" fill="#94A3B8" font-size="9" letter-spacing="1">R$ CUSTO</text>

  <!-- Row 1 -->
  <rect x="200" y="96" width="580" height="44" fill="#0D1E35" rx="3"/>
  <rect x="200" y="139" width="580" height="1" fill="#142235"/>
  <!-- Obra name -->
  <text x="216" y="112" fill="#F8FAFC" font-size="11" font-weight="500">Residencial Ibirapuera</text>
  <text x="216" y="128" fill="#94A3B8" font-size="9">São Paulo, SP · Início: Jan 2026</text>
  <!-- Progress bar -->
  <rect x="376" y="112" width="120" height="6" fill="#142235" rx="3"/>
  <rect x="376" y="112" width="86" height="6" fill="#1E88E5" rx="3"/>
  <text x="504" y="121" fill="#4FC3F7" font-size="10">72%</text>
  <!-- Team -->
  <circle cx="524" cy="118" r="8" fill="#1E88E5" opacity="0.3"/>
  <text x="521" y="122" fill="#4FC3F7" font-size="8">8</text>
  <text x="536" y="122" fill="#94A3B8" font-size="10">pessoas</text>
  <!-- Status chip -->
  <rect x="630" y="108" width="60" height="18" fill="#22C55E" opacity="0.15" rx="9"/>
  <circle cx="641" cy="117" r="3" fill="#22C55E"/>
  <text x="648" y="121" fill="#22C55E" font-size="9">No prazo</text>
  <!-- Cost -->
  <text x="726" y="116" fill="#F8FAFC" font-size="10">R$ 180k</text>
  <text x="726" y="130" fill="#94A3B8" font-size="9">de R$ 250k</text>

  <!-- Row 2 -->
  <rect x="200" y="144" width="580" height="44" fill="#0A1628" rx="3"/>
  <rect x="200" y="187" width="580" height="1" fill="#142235"/>
  <text x="216" y="160" fill="#F8FAFC" font-size="11" font-weight="500">Galpão Industrial Norte</text>
  <text x="216" y="176" fill="#94A3B8" font-size="9">Campinas, SP · Início: Mar 2026</text>
  <rect x="376" y="160" width="120" height="6" fill="#142235" rx="3"/>
  <rect x="376" y="160" width="43" height="6" fill="#1E88E5" rx="3"/>
  <text x="504" y="169" fill="#4FC3F7" font-size="10">36%</text>
  <circle cx="524" cy="166" r="8" fill="#1E88E5" opacity="0.3"/>
  <text x="521" y="170" fill="#4FC3F7" font-size="8">5</text>
  <text x="536" y="170" fill="#94A3B8" font-size="10">pessoas</text>
  <rect x="630" y="156" width="60" height="18" fill="#F59E0B" opacity="0.15" rx="9"/>
  <circle cx="641" cy="165" r="3" fill="#F59E0B"/>
  <text x="648" y="169" fill="#F59E0B" font-size="9">Atenção</text>
  <text x="726" y="164" fill="#F8FAFC" font-size="10">R$ 62k</text>
  <text x="726" y="178" fill="#94A3B8" font-size="9">de R$ 170k</text>

  <!-- Row 3 -->
  <rect x="200" y="192" width="580" height="44" fill="#0D1E35" rx="3"/>
  <text x="216" y="208" fill="#F8FAFC" font-size="11" font-weight="500">Condomínio Rio Claro</text>
  <text x="216" y="224" fill="#94A3B8" font-size="9">Rio Claro, SP · Início: Abr 2026</text>
  <rect x="376" y="208" width="120" height="6" fill="#142235" rx="3"/>
  <rect x="376" y="208" width="12" height="6" fill="#4FC3F7" rx="3"/>
  <text x="504" y="217" fill="#4FC3F7" font-size="10">10%</text>
  <circle cx="524" cy="214" r="8" fill="#1E88E5" opacity="0.3"/>
  <text x="521" y="218" fill="#4FC3F7" font-size="8">3</text>
  <text x="536" y="218" fill="#94A3B8" font-size="10">pessoas</text>
  <rect x="630" y="204" width="60" height="18" fill="#1E88E5" opacity="0.15" rx="9"/>
  <circle cx="641" cy="213" r="3" fill="#4FC3F7"/>
  <text x="648" y="217" fill="#4FC3F7" font-size="9">Iniciando</text>
  <text x="726" y="212" fill="#F8FAFC" font-size="10">R$ 18k</text>
  <text x="726" y="226" fill="#94A3B8" font-size="9">de R$ 320k</text>

  <!-- Bottom stats row -->
  <rect x="200" y="252" width="580" height="1" fill="#142235"/>

  <!-- Stat cards -->
  <rect x="200" y="260" width="130" height="60" fill="#0D1E35" rx="4"/>
  <rect x="200" y="260" width="2" height="60" fill="#1E88E5" rx="1"/>
  <text x="216" y="282" fill="#94A3B8" font-size="9" letter-spacing="1">EQUIPAMENTOS</text>
  <text x="216" y="302" fill="#F8FAFC" font-size="20" font-weight="300">14</text>
  <text x="216" y="314" fill="#22C55E" font-size="9">12 ativos · 2 manutenção</text>

  <rect x="342" y="260" width="130" height="60" fill="#0D1E35" rx="4"/>
  <rect x="342" y="260" width="2" height="60" fill="#4FC3F7" rx="1"/>
  <text x="358" y="282" fill="#94A3B8" font-size="9" letter-spacing="1">CUSTO TOTAL MÊS</text>
  <text x="358" y="302" fill="#F8FAFC" font-size="20" font-weight="300">R$ 48k</text>
  <text x="358" y="314" fill="#94A3B8" font-size="9">Dentro do orçamento</text>

  <rect x="484" y="260" width="130" height="60" fill="#0D1E35" rx="4"/>
  <rect x="484" y="260" width="2" height="60" fill="#22C55E" rx="1"/>
  <text x="500" y="282" fill="#94A3B8" font-size="9" letter-spacing="1">EQUIPES ATIVAS</text>
  <text x="500" y="302" fill="#F8FAFC" font-size="20" font-weight="300">16</text>
  <text x="500" y="314" fill="#94A3B8" font-size="9">3 obras · em campo agora</text>

  <rect x="626" y="260" width="154" height="60" fill="#0D1E35" rx="4"/>
  <rect x="626" y="260" width="2" height="60" fill="#F59E0B" rx="1"/>
  <text x="642" y="282" fill="#94A3B8" font-size="9" letter-spacing="1">ALERTAS</text>
  <text x="642" y="302" fill="#F8FAFC" font-size="20" font-weight="300">1</text>
  <text x="642" y="314" fill="#F59E0B" font-size="9">Galpão: prazo em risco</text>

  <!-- Bottom bar / branding -->
  <rect x="0" y="360" width="800" height="40" fill="#0D1E35"/>
  <rect x="0" y="360" width="800" height="1" fill="#142235"/>
  <text x="200" y="384" fill="#94A3B8" font-size="9" letter-spacing="1">FLOWCIVIL · GESTÃO DE OBRAS</text>
  <text x="700" y="384" fill="#1E88E5" font-size="9" class="mono">riverflowdev.com</text>
</svg>
