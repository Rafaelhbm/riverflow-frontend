  <rect x="200" y="86" width="580" height="36" fill="#F59E0B" opacity="0.05" rx="3"/>
  <rect x="200" y="86" width="3" height="36" fill="#EF4444" rx="1"/>
  <rect x="200" y="121" width="580" height="1" fill="#142235"/>
  <text x="216" y="102" fill="#F8FAFC" font-size="11" font-weight="500">Arroz Branco 5kg</text>
  <text x="216" y="115" fill="#94A3B8" font-size="9">Grãos · Cód. 001</text>
