  <text x="456" y="104" fill="#94A3B8" font-size="9"> </text>
  <text x="456" y="102" fill="#94A3B8" font-size="8">mín: 20</text>
  <text x="540" y="104" fill="#F8FAFC" font-size="11">R$ 18,50</text>
  <text x="650" y="104" fill="#F8FAFC" font-size="11">R$ 27,90</text>
  <rect x="724" y="92" width="50" height="18" fill="#EF4444" opacity="0.15" rx="9"/>
