  <rect x="724" y="252" width="46" height="18" fill="#22C55E" opacity="0.15" rx="9"/>
  <text x="730" y="265" fill="#22C55E" font-size="8" font-weight="500">NORMAL</text>

  <!-- Margin chart area -->
  <rect x="200" y="296" width="580" height="1" fill="#142235"/>

  <!-- Summary cards -->
  <rect x="200" y="304" width="136" height="56" fill="#0D1E35" rx="4"/>
  <rect x="200" y="304" width="2" height="56" fill="#1E88E5" rx="1"/>
  <text x="216" y="322" fill="#94A3B8" font-size="9" letter-spacing="1">MARGEM MÉDIA</text>
  <text x="216" y="344" fill="#F8FAFC" font-size="22" font-weight="300">34%</text>
  <text x="216" y="356" fill="#22C55E" font-size="9">+2pp vs mês passado</text>

  <rect x="348" y="304" width="136" height="56" fill="#0D1E35" rx="4"/>
  <rect x="348" y="304" width="2" height="56" fill="#4FC3F7" rx="1"/>
  <text x="364" y="322" fill="#94A3B8" font-size="9" letter-spacing="1">PRODUTOS EM ALERTA</text>
  <text x="364" y="344" fill="#F8FAFC" font-size="22" font-weight="300">2</text>
  <text x="364" y="356" fill="#F59E0B" font-size="9">Pedido automático gerado</text>

  <rect x="496" y="304" width="136" height="56" fill="#0D1E35" rx="4"/>
  <rect x="496" y="304" width="2" height="56" fill="#22C55E" rx="1"/>
  <text x="512" y="322" fill="#94A3B8" font-size="9" letter-spacing="1">ENTRADAS MÊS</text>
  <text x="512" y="344" fill="#F8FAFC" font-size="22" font-weight="300">R$ 68k</text>
  <text x="512" y="356" fill="#94A3B8" font-size="9">147 produtos rastreados</text>

  <rect x="644" y="304" width="136" height="56" fill="#0D1E35" rx="4"/>
  <rect x="644" y="304" width="2" height="56" fill="#F59E0B" rx="1"/>
  <text x="660" y="322" fill="#94A3B8" font-size="9" letter-spacing="1">LUCRO LÍQUIDO</text>
  <text x="660" y="344" fill="#F8FAFC" font-size="22" font-weight="300">R$ 23k</text>
  <text x="660" y="356" fill="#22C55E" font-size="9">Calculado em tempo real</text>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="800" height="40" fill="#0D1E35"/>
  <rect x="0" y="360" width="800" height="1" fill="#142235"/>
  <text x="200" y="384" fill="#94A3B8" font-size="9" letter-spacing="1">FLOWSTOCK · CONTROLE DE ESTOQUE E MARGEM</text>
  <text x="700" y="384" fill="#1E88E5" font-size="9" class="mono">riverflowdev.com</text>
