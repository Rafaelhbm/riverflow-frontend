  <rect x="816" y="92" width="38" height="18" fill="#22C55E" opacity="0.15" rx="3"/>
  <text x="820" y="104" fill="#22C55E" font-size="9">+33%</text>

  <!-- Row 2: Feijão - ok -->
  <rect x="200" y="126" width="580" height="36" fill="#0D1E35" rx="3"/>
  <rect x="200" y="126" width="3" height="36" fill="#22C55E" rx="1"/>
