  <text x="540" y="224" fill="#F8FAFC" font-size="11">R$ 12,80</text>
  <text x="650" y="224" fill="#F8FAFC" font-size="11">R$ 19,90</text>
  <rect x="724" y="212" width="46" height="18" fill="#22C55E" opacity="0.15" rx="9"/>
  <text x="730" y="225" fill="#22C55E" font-size="8" font-weight="500">NORMAL</text>

