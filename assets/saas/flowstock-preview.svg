<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0A1628"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1" fill="#1E88E5" opacity="0.06"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>

  <!-- Left sidebar -->
  <rect x="0" y="0" width="180" height="400" fill="#0D1E35"/>
  <rect x="180" y="0" width="1" height="400" fill="#142235"/>

  <!-- Logo -->
  <text x="20" y="38" fill="#1E88E5" font-size="13" font-weight="500" letter-spacing="2" class="mono">FLOWSTOCK</text>
  <rect x="20" y="46" width="140" height="1" fill="#1E88E5" opacity="0.3"/>

  <!-- Nav items -->
  <rect x="0" y="60" width="180" height="32" fill="#1E88E5" opacity="0.12"/>
  <rect x="16" y="70" width="3" height="12" fill="#1E88E5" rx="1"/>
  <text x="28" y="81" fill="#F8FAFC" font-size="11" font-weight="500">Estoque</text>
  <text x="28" y="114" fill="#94A3B8" font-size="11">Custos e Margem</text>
  <text x="28" y="146" fill="#94A3B8" font-size="11">Caixa</text>
  <text x="28" y="178" fill="#94A3B8" font-size="11">Fornecedores</text>
  <text x="28" y="210" fill="#94A3B8" font-size="11">Relatórios</text>
  <text x="28" y="242" fill="#94A3B8" font-size="11">Alertas</text>

  <rect x="20" y="260" width="140" height="1" fill="#142235"/>

  <!-- Alert badge -->
  <rect x="20" y="274" width="140" height="44" fill="#F59E0B" opacity="0.08" rx="4"/>
  <rect x="20" y="274" width="2" height="44" fill="#F59E0B" rx="1"/>
  <text x="30" y="290" fill="#F59E0B" font-size="9" font-weight="500">2 ALERTAS ATIVOS</text>
  <text x="30" y="305" fill="#94A3B8" font-size="9">Arroz 5kg: crítico</text>
  <text x="30" y="317" fill="#94A3B8" font-size="9">Óleo 900ml: baixo</text>

  <!-- Main content area -->
  <rect x="180" y="0" width="620" height="52" fill="#0D1E35"/>
  <rect x="180" y="52" width="620" height="1" fill="#142235"/>
  <text x="204" y="30" fill="#F8FAFC" font-size="14" font-weight="500">Posição de Estoque — Agora</text>
  <text x="204" y="44" fill="#94A3B8" font-size="10">147 produtos · Atualizado em tempo real</text>

  <!-- Quick stats top right -->
  <rect x="580" y="8" width="90" height="34" fill="#0D1E35" rx="4"/>
  <text x="596" y="24" fill="#94A3B8" font-size="8" letter-spacing="1">SALDO CAIXA</text>
  <text x="596" y="38" fill="#22C55E" font-size="12" font-weight="500">R$ 12.840</text>

