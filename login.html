<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre na sua conta RiverFlow.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/auth.css">

    <title>Entrar — RiverFlow</title>
</head>
<body>
    <div class="auth-page">
        <div class="auth-topbar">
            <a href="/" aria-label="RiverFlow — página inicial">
                <svg width="160" height="32" viewBox="0 0 248 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="nb-fg" x1="138" y1="0" x2="195" y2="0" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#1565C0"/>
                            <stop offset="100%" stop-color="#64B5F6"/>
                        </linearGradient>
                    </defs>
                    <path d="M24 3 C17 3 13 7 13 13 L13 19 C13 23 9 24.5 6 25.5 C9 26.5 13 28 13 32 L13 39 C13 44.5 17 47 24 47" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M52 3 C59 3 63 7 63 13 L63 19 C63 23 67 24.5 70 25.5 C67 26.5 63 28 63 32 L63 39 C63 44.5 59 47 52 47" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M19 25.5 C23 13.5 33 13.5 38 25.5 C43 37.5 53 37.5 57 25.5" stroke="#4FC3F7" stroke-width="2.8" stroke-linecap="round"/>
                    <path d="M19 28 C23 16 33 16 38 28 C43 40 53 40 57 28" stroke="#1565C0" stroke-width="1.7" stroke-linecap="round" opacity="0.55"/>
                    <text x="83" y="33" font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-weight="700" font-size="23">
                        <tspan fill="#FFFFFF">River</tspan><tspan fill="url(#nb-fg)">Flow</tspan>
                    </text>
                </svg>
            </a>
        </div>

        <main class="auth-main">
            <div class="auth-card">
                <h1 class="auth-card__title">Entrar</h1>
                <p class="auth-card__subtitle">Acesse seus cursos e sua área de cliente.</p>

                <form id="form-login" novalidate>
                    <div class="auth-field">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" autocomplete="email" placeholder="voce@email.com" required>
                    </div>
                    <div class="auth-field">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" autocomplete="current-password" placeholder="Sua senha" required>
                    </div>

                    <button type="submit" class="auth-submit">Entrar</button>
                    <p id="auth-feedback" class="auth-feedback" role="status" aria-live="polite"></p>
                </form>

                <p class="auth-alt">Ainda não tem conta? <a href="/cadastro">Criar conta</a></p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
</body>
</html>
